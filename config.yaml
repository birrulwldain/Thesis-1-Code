# =========================================================================
# Q1 THESIS CONFIGURATION GATEWAY
# -------------------------------------------------------------------------
# File sentral untuk mengontrol parameter keempat blok komputasi sains Anda.
# Segala bentuk pengubahan resolusi, suhu, densitas, unsur, hingga matriks ML
# CUKUP DILAKUKAN DI SINI TANPA HARUS MENULIS ULANG KODE PYTHONNYA.
#
# PANDUAN EKSEKUSI TERMINAL (HELP COMMANDS)
# Jalankan perintah-perintah ini di terminal Mac/HPC Anda:
#
# 🟢 BLOK 1  : python libs_physics.py
#             (Jalankan simulasi 1 spektrum cepat & verifikasi deterministik ODE)
# 
# 🟢 BLOK 2  : python generate_dataset.py --samples 100 --cores 2
#             (Menciptakan "dataset_synthetic.h5" menggunakan Monte-Carlo paralel)
#             (Parameter akan ditarik dari config 'monte_carlo_synthesizer' ini)
#
# 🟢 BLOK 3  : python train_inversion_model.py --dataset dataset_synthetic.h5
#             (Melatih model kecerdasan buatan SVR dari data HDF5 Blok 2)
#
# 🟢 BLOK 4  : python empirical_validation.py --model model_inversi_svr.pkl --csv data_lab.csv
#             (Menembak data eksperimental mentah ke ML dan menghitung McWhirter limit)
# =========================================================================

instrument:
  wl_range_nm: [200.0, 900.0]        # Rentang pindaian CCD spektrometer [nm]
  resolution: 4000                 # Resolusi numerik (piksel termodinamika)
  fwhm_nm: 0.5                       # Resolusi fisik alat (Gaussian instrumental broadening)
  noise_level: 0.01                  # Fraksi derau sinyal (1%)

plasma_target:
  elements: ["Si", "Fe", "Al", "Ca"]       # Spesies plasma yang dominan di Batu/Tanah vulkanik Aceh
  fractions: [0.42, 0.39, 0.12, 0.07]      # Normalisasi fraksi stoikiometri dominan mol/massa
  mcwhirter_delta_E_eV: 4.5          # Celah energi hambatan optik terbesar (untuk batas LTE)

synthetic_dataset_profiles:
  volcanic_soil:
    plasma:
      T_core_range_K: [6000.0, 15000.0]
      ne_core_range_cm3: [1.0e16, 1.0e17]
    groups:
      A:
        description: "Major elements only (tanpa trace element)"
        elements:
          Si: [40.0, 60.0]
          Al: [10.0, 18.0]
          Fe: [5.0, 15.0]
          Ca: [3.0, 10.0]
          Mg: [2.0, 8.0]
          Na: [1.0, 5.0]
          K: [1.0, 5.0]
          Ti: [0.5, 2.0]
      B:
        description: "Major elements + trace elements"
        elements:
          Si: [40.0, 60.0]
          Al: [10.0, 18.0]
          Fe: [5.0, 15.0]
          Ca: [3.0, 10.0]
          Mg: [2.0, 8.0]
          Na: [1.0, 5.0]
          K: [1.0, 5.0]
          Ti: [0.5, 2.0]
          Mn: [0.05, 0.5]
          P: [0.05, 0.5]
          Ba: [0.01, 0.3]
          Sr: [0.01, 0.2]
          Zn: [0.005, 0.1]
          Cu: [0.001, 0.05]
          Ni: [0.001, 0.05]
          Cr: [0.001, 0.05]
          V: [0.001, 0.05]
          Rb: [0.001, 0.05]
          Pb: [0.001, 0.02]
          Co: [0.001, 0.02]
          Mo: [0.0005, 0.01]
          Y: [0.0005, 0.01]
          Zr: [0.001, 0.02]

monte_carlo_synthesizer:
  generator_samples: 100             # Default jumlah spektrum yang dibuat jika tidak diset via argumen CLI
  core:
    T_range_K: [8000.0, 18000.0]     # Mengakomodasi spektrum Saha maks di 9346 K, SVR bisa nebak core 2x lebih panas
    ne_range_cm3: [1.0e17, 8.0e17]   # Distribusi tebakan kerapatan Inti (Eksperimen asli 2.6e17 - 4.9e17)
    thickness_m: 0.001               # Kedalaman lintasan optik (1 mm)
  shell:
    T_range_K: [4000.0, 9000.0]      # Suhu pinggiran pendinginan
    ne_range_cm3: [1.0e15, 5.0e16]   # Kerapatan elektron Korona
    thickness_m: 0.002               # Kedalaman lintasan optik (2 mm)

machine_learning:
  svr_kernel: 'rbf'                  # Bentuk Support Vector
  svr_C: 1.0                         # Hyperparameter regulasi jarak galat

physics_extraction:
  continuum_windows:
    - [220.0, 230.0]                 # Jendela bebas garis pertama (Wien Tail)
    - [340.0, 350.0]                 # Jendela bebas garis kedua
  boltzmann_windows:
    - [394.0, 394.8]                 # Pita emisi resonansi 1 (misal Al I 394.4)
    - [395.8, 396.5]                 # Pita emisi resonansi 2 (misal Al I 396.1)
  stark_window: [393.0, 393.6]       # Pita ion dominan untuk FWHM & Self-Reversal (misal Ca II 393.3)
